post {
    success {
        slackSend(
            channel: '#jenkins-builds',
            message: "✅ SUCCESS: '${env.JOB_NAME} #${env.BUILD_NUMBER}' (<${env.BUILD_URL}|Open>)"
        )
    }
    failure {
        slackSend(
            channel: '#jenkins-builds',
            message: "❌ FAILURE: '${env.JOB_NAME} #${env.BUILD_NUMBER}' (<${env.BUILD_URL}|Open>)"
        )
    }
}